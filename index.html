<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photocard BTS</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#6a0dad;
    color:white;
    text-align:center;
    padding:20px;
}

#carrito{
    position:fixed;
    top:10px;
    right:10px;
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    width:250px;
}

.producto{
    display:flex;
    align-items:center;
    gap:20px;
    background:white;
    margin:20px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.producto img{
    width:120px;
    border-radius:10px;
}

.info{
    flex:1;
}

.precio{
    font-size:24px;
    font-weight:bold;
    color:#6a0dad;
}

button{
    background:#6a0dad;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<header>
<h1>💜 BTS Photocards 💜</h1>
</header>

<div id="carrito">
<h3>🛒 Carrito</h3>
<ul id="lista"></ul>
<p><strong>Total: $<span id="total">0</span></strong></p>
</div>

<div class="producto">
<img src="jungkook.jpg" alt="Jungkook">
<div class="info">
<h3>Jungkook Golden Era</h3>
<p class="precio">$25</p>
<button onclick="agregar('Jungkook Golden Era',25)">
Agregar al carrito
</button>
</div>
</div>

<div class="producto">
<img src="v.jpg" alt="V">
<div class="info">
<h3>V Layover Era</h3>
<p class="precio">$20</p>
<button onclick="agregar('V Layover Era',20)">
Agregar al carrito
</button>
</div>
</div>

<div class="producto">
<img src="jimin.jpg" alt="Jimin">
<div class="info">
<h3>Jimin Muse Era</h3>
<p class="precio">$15</p>
<button onclick="agregar('Jimin Muse Era',15)">
Agregar al carrito
</button>
</div>
</div>

<script>
let total = 0;

function agregar(nombre, precio){
    const lista = document.getElementById("lista");

    const item = document.createElement("li");
    item.textContent = nombre + " - $" + precio;

    lista.appendChild(item);

    total += precio;
    document.getElementById("total").textContent = total;
}
</script>

</body>
</html>
